<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>びすこリーグ予想</title>

<link rel="manifest" href="manifest-predict.json">
<link rel="apple-touch-icon" href="icon-predict.png">
<meta name="theme-color" content="#ffffff">

<style>
html,body{margin:0;height:100%}
iframe{width:100%;height:100%;border:none}
</style>
</head>

<body>
<div id="splash">
  <div id="logo-anim">

    <img src="blueL-left.svg" class="part leftL">
    <img src="three.svg" class="part three">
    <img src="blueL-right.svg" class="part rightL">
    <img src="text.svg" class="part text">

  </div>
</div>

<iframe id="main"
src="https://script.google.com/macros/s/AKfycbx18EK4B292PbYw24a9tkr2W-tcoLg7SBn-GHWgoKlCBPL8Yl3PyV751J-_rsuIRA4/exec">
</iframe>
<style>
html,body{
  margin:0;
  height:100%;
  background:#ffffff; /* ← 白背景 */
  overflow:hidden;
}

/* スプラッシュ画面 */
#splash{
  position:fixed;
  inset:0;
  background:#ffffff;
  display:flex;
  justify-content:center;
  align-items:center;   /* ← 完全中央 */
  z-index:9999;
}

/* ロゴ全体 */
#logo-anim{
  position:relative;
  width:800px;   /* ← サイズアップ */
  height:800px;
}

/* 全パーツ共通 */
.part{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  opacity:0;
}

/* アニメーション */

.leftL{
  animation:leftIn 0.8s ease forwards;
}

.three{
  animation:threeIn 0.8s ease 0.6s forwards;
}

.rightL{
  animation:rightIn 0.8s ease 1.3s forwards;
}

.text{
  transform:scaleX(0);
  transform-origin:left;
  animation:textExpand 0.8s ease 1.8s forwards;
}

@keyframes leftIn{
  from{transform:translateY(60px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

@keyframes threeIn{
  from{transform:translateY(-60px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

@keyframes rightIn{
  from{opacity:0;transform:scale(0.9);}
  to{opacity:1;transform:scale(1);}
}

@keyframes textExpand{
  to{opacity:1;transform:scaleX(1);}
}

#main{
  width:100%;
  height:100%;
  border:none;
  opacity:0;
  transition:opacity 0.6s ease;
}
</style>
<script>
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("main").style.opacity="1";
  },3000);
});
</script>
</body>
</html>
