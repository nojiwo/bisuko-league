<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>びすこリーグ予想</title>

<link rel="manifest" href="manifest-predict.json">
<link rel="apple-touch-icon" href="icon-predict.png">
<meta name="theme-color" content="#000000">

<style>
html,body{margin:0;height:100%}
iframe{width:100%;height:100%;border:none}
</style>
</head>

<body>
<div id="splash">
  <div id="logo-wrap">
    <img src="icon-predict.png" id="logo">
  </div>

  <div id="loader">
    <div id="bar"></div>
  </div>
</div>

<iframe id="main"
src="https://script.google.com/macros/s/AKfycbx18EK4B292PbYw24a9tkr2W-tcoLg7SBn-GHWgoKlCBPL8Yl3PyV751J-_rsuIRA4/exec">
</iframe>

<style>
html,body{
  margin:0;
  height:100%;
  background:#1c1c1e;
  font-family:sans-serif;
}

#splash{
  position:fixed;
  inset:0;
  background:#1c1c1e;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#logo-wrap{
  opacity:0;
  transform:translateY(40px);
  animation:logoIn 1s ease forwards;
}

#logo{
  width:160px;
}

@keyframes logoIn{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

#loader{
  width:200px;
  height:4px;
  background:#333;
  margin-top:40px;
  overflow:hidden;
  border-radius:4px;
}

#bar{
  width:0%;
  height:100%;
  background:#1da1f2;
  animation:loadBar 2.5s ease forwards;
}

@keyframes loadBar{
  to{
    width:100%;
  }
}

#main{
  width:100%;
  height:100%;
  border:none;
  opacity:0;
  transition:opacity 0.6s ease;
}
</style>

<script>
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("main").style.opacity="1";
  },2500);
});
</script>

</body>
</html>
